name: Daily Celebrations Shout-out

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Post even if it's not 7am ET (for testing)"
        type: boolean
        default: false
      date:
        description: "Pretend today is this date, YYYY-MM-DD (optional test)"
        required: false
        default: ""

jobs:
  shoutout:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Post celebrations to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          CUSTOM_BOT_NAME: ${{ secrets.CUSTOM_BOT_NAME }}
        run: |
          ARGS=""
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="--force"; fi
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          python celebrations-bot/shoutout.py $ARGS
