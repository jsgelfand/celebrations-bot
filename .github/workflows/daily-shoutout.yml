{"name":"Daily Celebrations Shout-out","on":{"schedule":[{"cron":"0 11 * * *"}],"workflow_dispatch":{"inputs":{"date":{"description":"Pretend today is this date YYYY-MM-DD","required":false,"default":""}}}},"jobs":{"shoutout":{"runs-on":"ubuntu-latest","steps":[{"name":"Check out repo","uses":"actions/checkout@v4"},{"name":"Set up Python","uses":"actions/setup-python@v5","with":{"python-version":"3.11"}},{"name":"Post celebrations to Slack","env":{"SLACK_BOT_TOKEN":"${{ secrets.SLACK_BOT_TOKEN }}","SLACK_CHANNEL_ID":"${{ secrets.SLACK_CHANNEL_ID }}","CUSTOM_BOT_NAME":"${{ secrets.CUSTOM_BOT_NAME }}"},"run":"python celebrations-bot/shoutout.py --force ${{ inputs.date && format('--date {0}', inputs.date) || '' }}"}]}}}
